services:
  investry-api:
    container_name: investry-api
    build:
      context: .
      dockerfile: src/API/Investry.API/Dockerfile
    ports:
      - "8080:80"
    environment:
      - ASPNETCORE_URLS=http://+:80
    depends_on:
      - sqlserver
      - redis

  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: sqlserver
    environment: 
      ACCEPT_EULA: "Y"
      SA_PASSWORD: "InvesTry123!"
    ports:
      - "1433:1433"
    volumes:
      - sql_data:/var/opt/mssql
  redis:
    image: redis:latest
    container_name: redis
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    restart: unless-stopped



volumes:
  sql_data:
  redis_data: